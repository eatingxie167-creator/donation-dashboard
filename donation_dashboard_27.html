<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廣告捐款日報儀表板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--color-background-primary:#ffffff;--color-background-secondary:#f5f5f4;--color-text-primary:#1c1917;--color-text-secondary:#78716c;--color-border-tertiary:#e7e5e4;--color-border-secondary:#d6d3d1;--border-radius-md:8px;--border-radius-lg:12px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@media(prefers-color-scheme:dark){:root{--color-background-primary:#1c1917;--color-background-secondary:#292524;--color-text-primary:#fafaf9;--color-text-secondary:#a8a29e;--color-border-tertiary:#44403c;--color-border-secondary:#57534e}}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);padding:1.5rem;max-width:1300px;margin:0 auto}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:10px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.btn-primary{background:#E1F5EE;color:#085041;border-color:#1D9E75}
.btn-primary:hover{background:#c8eede}
.upload-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1rem}
.upload-zone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1rem;text-align:center;cursor:pointer;transition:background .15s}
.upload-zone:hover,.upload-zone.drag{background:var(--color-background-secondary)}
.upload-zone.loaded{border-color:#1D9E75;border-style:solid}
.up-icon{font-size:18px;color:var(--color-text-secondary);margin-bottom:4px}
.up-title{font-size:11px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.up-sub{font-size:10px;color:var(--color-text-secondary)}
.global-date{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:1.5rem;font-size:12px;color:var(--color-text-secondary)}
.global-date input[type=date]{font-size:12px;padding:3px 6px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.global-date label{font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.badge-meta{background:#E6EEF7;color:#0C447C}
.badge-google{background:#FAEEDA;color:#633806}
.badge-line{background:#E6F5EC;color:#065f46}
.badge-total{background:#E1F5EE;color:#085041}
.section-hd{display:flex;align-items:center;gap:8px;margin:1.25rem 0 10px}
.metrics-grid-7{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.m-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.m-label{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px;line-height:1.4}
.m-val{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.m-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.divider{height:.5px;background:var(--color-border-tertiary);margin:1.25rem 0}
.chart-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.875rem 1rem;margin-bottom:1rem}
.chart-legend{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:var(--color-text-secondary);flex-wrap:wrap}
.chart-legend span{display:flex;align-items:center;gap:4px}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:.5rem}
.tbl th{font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);text-align:right;white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl td{padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);color:var(--color-text-primary);text-align:right}
.tbl td:first-child{text-align:left;color:var(--color-text-secondary)}
.tbl tr:last-child td{border-bottom:none}
.tbl .tot td{font-weight:500;background:var(--color-background-secondary)}
.tbl .der{color:var(--color-text-secondary)}
.hint{font-size:11px;color:var(--color-text-secondary);padding:.75rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:1rem}
.ad-wrap{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:auto;margin-bottom:.75rem}
.ad-tbl{border-collapse:collapse;font-size:12px}
.ad-tbl th{padding:6px 10px;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:right;border-bottom:.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);white-space:nowrap;min-width:100px}
.ad-tbl th.rh{text-align:left;position:sticky;left:0;background:var(--color-background-secondary);min-width:130px}
.ad-tbl td{padding:6px 10px;border-bottom:.5px solid var(--color-border-tertiary);text-align:right;color:var(--color-text-primary);white-space:nowrap}
.ad-tbl td.rh{text-align:left;font-weight:500;background:var(--color-background-primary);position:sticky;left:0;color:var(--color-text-primary)}
.ad-tbl .tot td{font-weight:500;background:var(--color-background-secondary);border-top:.5px solid var(--color-border-secondary)}
.ad-tbl .tot td.rh{background:var(--color-background-secondary)}
.config-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:#FAEEDA;color:#633806;margin-left:6px}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:background .15s}
.tab-btn:hover{background:var(--color-background-secondary)}
.tab-btn.active-total{background:#E1F5EE;color:#085041;border-color:#1D9E75}
.tab-btn.active-meta{background:#E6EEF7;color:#0C447C;border-color:#378ADD}
.tab-btn.active-google{background:#FAEEDA;color:#633806;border-color:#BA7517}
.tab-btn.active-line{background:#E6F5EC;color:#065f46;border-color:#1D9E75}
.daily-sep{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin:12px 0 8px;display:flex;align-items:center;gap:8px}
.daily-sep::after{content:'';flex:1;height:.5px;background:var(--color-border-tertiary)}
.camp-sep{font-size:11px;color:var(--color-text-secondary);margin:10px 0 6px;padding-left:2px}
.multiselect-wrap{position:relative;display:inline-block;margin-bottom:14px}
.multiselect-btn{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 12px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;min-width:220px;justify-content:space-between}
.multiselect-btn:hover{background:var(--color-background-secondary)}
.multiselect-dropdown{position:absolute;top:calc(100% + 4px);left:0;min-width:220px;background:var(--color-background-primary);border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;display:none}
.multiselect-dropdown.open{display:block}
.multiselect-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;cursor:pointer;color:var(--color-text-primary)}
.multiselect-item:hover{background:var(--color-background-secondary)}
.multiselect-item input[type=checkbox]{accent-color:#378ADD;width:14px;height:14px;cursor:pointer}
.selected-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sel-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#E6EEF7;color:#0C447C}
</style>
</head>
<body>
<div class="top-bar">
  <div class="page-title"><i class="ti ti-chart-bar"></i> 廣告捐款日報儀表板</div>
  <div class="top-actions">
    <button class="btn btn-primary" onclick="document.getElementById('fi-config').click()"><i class="ti ti-settings"></i> 上傳活動設定表</button>
    <input type="file" id="fi-config" accept=".xlsx,.xls" style="display:none">
    <span id="config-tag" style="display:none" class="config-tag"><i class="ti ti-check"></i> <span id="config-name"></span></span>
    <button class="btn btn-primary" onclick="reloadAllSheets()" id="btn-reload"><i class="ti ti-refresh"></i> 重新抓取</button>
    <button class="btn" onclick="clearAll()"><i class="ti ti-trash"></i> 清除資料</button>
  </div>
</div>

<div class="upload-row">
  <div class="upload-zone" id="dz-xlsx" style="cursor:default">
    <div class="up-icon"><i class="ti ti-table"></i></div>
    <div class="up-title">捐款日報</div>
    <button class="btn btn-primary" style="font-size:10px;padding:4px 10px;margin:4px auto 2px;display:flex" onclick="loadDonFromSheets()"><i class="ti ti-refresh"></i> 從 Sheets 載入</button>
    <div class="up-sub" style="cursor:pointer;text-decoration:underline" onclick="document.getElementById('fi-xlsx').click()" id="sub-xlsx">或點擊上傳 xlsx</div>
    <div id="sheets-status-don" style="font-size:10px;margin-top:3px;min-height:13px"></div>
    <input type="file" id="fi-xlsx" accept=".xlsx,.xls" style="display:none">
  </div>
  <div class="upload-zone" id="dz-meta" style="cursor:default">
    <div class="up-icon"><i class="ti ti-brand-facebook"></i></div>
    <div class="up-title">Meta 廣告成效</div>
    <button class="btn btn-primary" style="font-size:10px;padding:4px 10px;margin:4px auto 2px;display:flex" onclick="loadMetaFromAPI()"><i class="ti ti-brand-facebook"></i> 從 Meta 抓取</button>
    <div class="up-sub" style="cursor:pointer;text-decoration:underline" onclick="document.getElementById('fi-meta').click()" id="sub-meta">或點擊上傳 CSV</div>
    <div id="sheets-status-meta" style="font-size:10px;margin-top:3px;min-height:13px"></div>
    <input type="file" id="fi-meta" accept=".csv" style="display:none">
  </div>
  <div class="upload-zone" id="dz-goo" style="cursor:default">
    <div class="up-icon"><i class="ti ti-brand-google"></i></div>
    <div class="up-title">Google 廣告成效</div>
    <button class="btn btn-primary" style="font-size:10px;padding:4px 10px;margin:4px auto 2px;display:flex" onclick="loadGooFromSheets()"><i class="ti ti-refresh"></i> 從 Sheets 載入</button>
    <div class="up-sub" style="cursor:pointer;text-decoration:underline" onclick="document.getElementById('fi-goo').click()" id="sub-goo">或點擊上傳 CSV</div>
    <div id="sheets-status-goo" style="font-size:10px;margin-top:3px;min-height:13px"></div>
    <input type="file" id="fi-goo" accept=".csv" style="display:none">
  </div>
  <div class="upload-zone" id="dz-line" style="cursor:default">
    <div class="up-icon"><i class="ti ti-message-circle"></i></div>
    <div class="up-title">LINE 廣告成效 xlsx</div>
    <button class="btn btn-primary" style="font-size:10px;padding:4px 10px;margin:4px auto 2px;display:flex" onclick="loadLineFromSheets()"><i class="ti ti-refresh"></i> 從 Sheets 載入</button>
    <div class="up-sub" style="cursor:pointer;text-decoration:underline" onclick="document.getElementById('fi-line').click()" id="sub-line">或點擊上傳 xlsx</div>
    <div id="sheets-status-line" style="font-size:10px;margin-top:3px;min-height:13px"></div>
    <input type="file" id="fi-line" accept=".xlsx,.xls" style="display:none">
  </div>
</div>

<div class="global-date" id="date-bar" style="display:none">
  <label><i class="ti ti-calendar" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>日期區間</label>
  <input type="date" id="g-from"><span>—</span><input type="date" id="g-to">
  <span id="date-hint" style="margin-left:4px;font-size:11px"></span>
</div>

<div id="dashboard"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const C_SPEND='#888780',C_AMT='#BA7517',C_CNT='#633806';
const SKIP=['專案目標','報表格式範例'];
const WEEKDAYS=['日','一','二','三','四','五','六'];

const DEFAULT_CONFIG={
  meta:[
    {label:'Consideration VC',campNames:['fb_paid_post_sp_dom_2026_Jun_ccf_consideration_vc'],utmIds:['120243319700390539']},
    {label:'Action ATC',campNames:['fb_paid_post_sp_dom_2026_Jun_ccf_action_atc'],utmIds:['120243319595970539']},
    {label:'Action Purchase',campNames:['fb_paid_post_sp_dom_2026_Jun_ccf_action_purchase'],utmIds:['120243316748250539']},
  ],
  google:[
    {label:'Pmax',campNames:[],campNamePattern:'pmax',utmContents:['pmax']},
    {label:'SEM品牌字',campNames:['google_ads_cpc_gsm_sp_dom_2026_Jun_ccf_brand'],utmContents:['brand']},
    {label:'SEM產品字',campNames:['google_ads_cpc_gsm_sp_dom_2026_Jun_ccf_product'],utmContents:['sponsorship']},
    {label:'SEM需求字',campNames:['google_ads_cpc_gsm_sp_dom_2026_Jun_ccf_generic'],utmContents:['donation']},
    {label:'SEM競品字',campNames:['google_ads_cpc_gsm_sp_dom_2026_Jun_ccf_competitor'],utmContents:['children','charity']},
    {label:'Demandgen',campNames:['google_ads_dgc_sp_dom_2026_Jun_ccf_cpa'],utmContents:['dgc']},
  ],
  line:[{label:'action',utmSources:['line']}]
};
let CONFIG=JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let charts=[],donWb=null,donRows=null,metaAdRows=null,gooAdRows=null,lineAdRows=null,daily=[];
let currentAdTab='total';

function parseConfig(wb){
  const cfg={meta:[],google:[],line:[]};
  ['Meta','Google','LINE'].forEach(sheet=>{
    if(!wb.Sheets[sheet])return;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheet],{defval:''});
    const map={};
    rows.forEach(r=>{
      const label=String(r['活動標籤（顯示名稱）']||'').trim();if(!label)return;
      const campRaw=String(r['廣告報表活動名稱（完整）']||r['utm_source 值']||'').trim();
      const extra=String(r['utm_id']||r['utm_content 關鍵字']||'').trim();
      if(sheet==='Meta'){if(!map[label])map[label]={label,campNames:[],utmIds:[]};map[label].campNames.push(...campRaw.split(',').map(s=>s.trim()).filter(Boolean));map[label].utmIds.push(...extra.split(',').map(s=>s.trim()).filter(Boolean));}
      else if(sheet==='Google'){if(!map[label])map[label]={label,campNames:[],utmContents:[]};map[label].campNames.push(...campRaw.split(',').map(s=>s.trim()).filter(Boolean));map[label].utmContents.push(...extra.split(',').map(s=>s.trim()).filter(Boolean));}
      else{if(!map[label])map[label]={label,utmSources:[]};map[label].utmSources.push(...campRaw.split(',').map(s=>s.trim()).filter(Boolean));}
    });
    cfg[sheet.toLowerCase()]=Object.values(map);
  });
  return cfg;
}

function parseSrc(p){const s=String(p||'');if(s.includes('utm_source=facebook'))return'facebook';if(s.includes('utm_source=google'))return'google';if(s.includes('utm_source=line'))return'line';return'other';}
function rowDateIso(row){
  const raw=row['訂單日期'];if(!raw)return null;
  if(raw instanceof Date)return raw.getFullYear()+'-'+(raw.getMonth()+1).toString().padStart(2,'0')+'-'+raw.getDate().toString().padStart(2,'0');
  if(typeof raw==='string'){const m=raw.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[0];const m2=raw.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);if(m2)return m2[1]+'-'+m2[2].padStart(2,'0')+'-'+m2[3].padStart(2,'0');}
  if(typeof raw==='number'){const d=new Date(Math.round((raw-25569)*86400*1000));return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
  return null;
}
function isoDate(d){return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}

// 日期標籤加星期：6/8(一)
function dlWithWeek(iso){
  const[y,m,d]=iso.split('-').map(Number);
  const date=new Date(y,m-1,d);
  const week=WEEKDAYS[date.getDay()];
  return m+'/'+d+'('+week+')';
}

function fmt(n){if(n===null||n===undefined||isNaN(n)||n==='')return'—';return Math.round(n).toLocaleString();}
function fmtD(n){if(!n||isNaN(n)||!isFinite(n))return'—';return'$'+Math.round(n).toLocaleString();}
function pct(a,b){return b?((a/b)*100).toFixed(1)+'%':'—';}
function numVal(v){const n=parseFloat(String(v||'').replace(/,/g,''));return isNaN(n)?0:n;}
function getRange(){return{from:document.getElementById('g-from').value,to:document.getElementById('g-to').value};}
function validRow(r){return!String(r['付款狀態']||'').includes('失敗');}

function cleanMoney(v){const s=String(v||'').replace(/[^\d.-]/g,'');const n=parseFloat(s);return isNaN(n)?0:n;}
function calcM(rows){
  const valid=rows.filter(validRow);
  const c5rows=valid.filter(r=>Number(r['捐款科目'])===5200);
  const total=valid.reduce((s,r)=>s+(+r['捐款數量']||0),0);
  const c5=c5rows.reduce((s,r)=>s+(+r['捐款數量']||0),0);
  const amt=valid.reduce((s,r)=>s+cleanMoney(r['捐款總額']),0);
  const a5=c5rows.reduce((s,r)=>s+cleanMoney(r['捐款總額']),0);
  return{total,c5,nc5:total-c5,amt,a5};
}
function filtDaily(){const{from,to}=getRange();return daily.filter(d=>d.isoDate>=from&&d.isoDate<=to);}

function matchMeta(row,camp){const p=String(row['來源參數']||'');if(!p.includes('utm_source=facebook'))return false;return camp.utmIds.some(id=>p.includes('utm_id='+id));}
function matchGoogle(row,camp){const p=String(row['來源參數']||'');if(!p.includes('utm_source=google'))return false;const m=p.match(/utm_content=([^&]*)/);if(!m)return false;const c=m[1].toLowerCase();return camp.utmContents.some(kw=>c.includes(kw.toLowerCase()));}
function matchLine(row){return String(row['來源參數']||'').includes('utm_source=line');}

function adSpendBySource(from,to,src){
  let s=0;
  if((src==='meta'||src==='total')&&metaAdRows){const ns=CONFIG.meta.flatMap(c=>c.campNames);metaAdRows.filter(r=>{const dt=r['分析報告開始']||'';return dt>=from&&dt<=to&&ns.includes(r['行銷活動名稱']);}).forEach(r=>{s+=(+r['花費金額 (TWD)']||0);});}
  if((src==='google'||src==='total')&&gooAdRows){gooAdRows.filter(r=>{const dt=r['日期']||'';if(dt<from||dt>to)return false;const name=String(r['廣告活動']||'');return CONFIG.google.some(c=>c.campNamePattern?name.toLowerCase().includes(c.campNamePattern):(c.campNames||[]).includes(name));}).forEach(r=>{s+=numVal(r['費用']);});}
  if((src==='line'||src==='total')&&lineAdRows){lineAdRows.filter(r=>{const dt=r['_dayIso']||'';return dt>=from&&dt<=to;}).forEach(r=>{s+=numVal(r['Cost']);});}
  return s;
}
function adByDay(iso,src,field){
  let s=0;
  const metaField={'spend':'花費金額 (TWD)','click':'連結點擊次數','atc':'加到購物車次數','purch':'購買次數'};
  const gooField={'spend':'費用','click':'點擊','atc':'ATC-點擊月捐按鈕','purch':'Purchase-完成捐款'};
  const lineField={'spend':'Cost','click':'Clicks','atc':'AddToCart','purch':'Purchase'};
  if((src==='meta'||src==='total')&&metaAdRows){const ns=CONFIG.meta.flatMap(c=>c.campNames);metaAdRows.filter(r=>r['分析報告開始']===iso&&ns.includes(r['行銷活動名稱'])).forEach(r=>{s+=numVal(r[metaField[field]]);});}
  if((src==='google'||src==='total')&&gooAdRows){gooAdRows.filter(r=>{if(r['日期']!==iso)return false;const name=String(r['廣告活動']||'');return CONFIG.google.some(c=>c.campNamePattern?name.toLowerCase().includes(c.campNamePattern):(c.campNames||[]).includes(name));}).forEach(r=>{s+=numVal(r[gooField[field]]);});}
  if((src==='line'||src==='total')&&lineAdRows){lineAdRows.filter(r=>r['_dayIso']===iso).forEach(r=>{s+=numVal(r[lineField[field]]);});}
  return s;
}
function adSpendByDay(iso,src){return adByDay(iso,src,'spend');}

// 按活動取每日廣告數據
function adCampByDay(iso,camp,src){
  const campNames=camp.campNames||[];
  let spend=0,click=0,atc=0,purch=0;

// 標準化 TA/SP：統一轉成兩位數 TA01, SP01
function normalizeTA(s){if(!s)return null;const m=String(s).match(/TA(\d+)/i);if(!m)return null;return'TA'+m[1].padStart(2,'0');}
function normalizeSP(s){if(!s)return null;const m=String(s).match(/SP(\d+)/i);if(!m)return null;return'SP'+m[1].padStart(2,'0');}

function parseTA(utmContent){return normalizeTA(utmContent);}
function parseSP(utmContent){return normalizeSP(utmContent);}
function getUtmContent(row){const p=String(row['來源參數']||'');const m=p.match(/utm_content=([^&]*)/);return m?m[1]:'';}

// 從廣告報表廣告組合名稱/廣告名稱解析 TA/SP（同樣標準化）
function parseTAFromAdset(name){return normalizeTA(name);}
function parseSPFromAd(name){return normalizeSP(name);}

function buildAudienceTable(filtAd,allDon,selectedCamps,cfg){
  // 收集所有 TA
  const taSet=new Set();
  filtAd.forEach(r=>{const ta=parseTAFromAdset(r['廣告組合名稱']);if(ta)taSet.add(ta);});
  allDon.forEach(r=>{const ta=parseTA(getUtmContent(r));if(ta)taSet.add(ta);});
  const tas=[...taSet].sort();
  if(!tas.length)return'';

  // 過濾選中活動
  const selCampNames=cfg.filter(c=>selectedCamps.includes(c.label)).flatMap(c=>c.campNames);

  const rows=tas.map(ta=>{
    const ca=filtAd.filter(r=>selCampNames.includes(r['行銷活動名稱'])&&parseTAFromAdset(r['廣告組合名稱'])===ta);
    const don=allDon.filter(r=>{
      if(!selectedCamps.length)return false;
      const p=String(r['來源參數']||'');
      if(!p.includes('utm_source=facebook'))return false;
      const inCamp=cfg.filter(c=>selectedCamps.includes(c.label)).some(c=>c.utmIds.some(id=>p.includes('utm_id='+id)));
      return inCamp&&parseTA(getUtmContent(r))===ta;
    });
    const spend=ca.reduce((s,r)=>s+(+r['花費金額 (TWD)']||0),0);
    const click=ca.reduce((s,r)=>s+(+r['連結點擊次數']||0),0);
    const atc=ca.reduce((s,r)=>s+(+r['加到購物車次數']||0),0);
    const purch=ca.reduce((s,r)=>s+(+r['購買次數']||0),0);
    return{label:ta,...campStats(spend,click,atc,purch,don)};
  });
  return buildCampTable(rows);
}

function buildCreativeTable(filtAd,allDon,selectedCamps,cfg,selectedTA){
  const selCampNames=cfg.filter(c=>selectedCamps.includes(c.label)).flatMap(c=>c.campNames);
  // 若選了特定 TA，廣告資料只看該 TA 的廣告組合
  const filtAdTA=selectedTA?filtAd.filter(r=>parseTAFromAdset(r['廣告組合名稱'])===selectedTA):filtAd;

  const spSet=new Set();
  filtAdTA.forEach(r=>{const sp=parseSPFromAd(r['廣告名稱']);if(sp)spSet.add(sp);});
  allDon.forEach(r=>{
    const uc=getUtmContent(r);const sp=parseSP(uc);if(!sp)return;
    if(selectedTA&&parseTA(uc)!==selectedTA)return;
    spSet.add(sp);
  });
  const sps=[...spSet].sort();
  if(!sps.length)return'';

  const rows=sps.map(sp=>{
    const ca=filtAdTA.filter(r=>selCampNames.includes(r['行銷活動名稱'])&&parseSPFromAd(r['廣告名稱'])===sp);
    const don=allDon.filter(r=>{
      if(!selectedCamps.length)return false;
      const p=String(r['來源參數']||'');
      if(!p.includes('utm_source=facebook'))return false;
      const inCamp=cfg.filter(c=>selectedCamps.includes(c.label)).some(c=>c.utmIds.some(id=>p.includes('utm_id='+id)));
      const uc=getUtmContent(r);
      return inCamp&&parseSP(uc)===sp&&(selectedTA?parseTA(uc)===selectedTA:true);
    });
    const spend=ca.reduce((s,r)=>s+(+r['花費金額 (TWD)']||0),0);
    const click=ca.reduce((s,r)=>s+(+r['連結點擊次數']||0),0);
    const atc=ca.reduce((s,r)=>s+(+r['加到購物車次數']||0),0);
    const purch=ca.reduce((s,r)=>s+(+r['購買次數']||0),0);
    return{label:sp,...campStats(spend,click,atc,purch,don)};
  });
  return buildCampTable(rows);
}

      const active=ta==='全部'?!metaSelectedTA:metaSelectedTA===ta;
      const val=ta==='全部'?'null':`'${ta}'`;
      return`<button class="tab-btn${active?' active-meta':''}" onclick="selectMetaTA(${val})">${ta}</button>`;
    }).join('');
    html+=`<div class="tab-bar">${taBtns}</div>`;
  }
  html+=buildCreativeTable(filtAd,allDon,sel,cfg,metaSelectedTA)||'<p style="font-size:12px;color:var(--color-text-secondary);padding:.5rem 0">無素材數據</p>';
  el.innerHTML=html;
}

function buildMediaSection(src,cfg,adRows,filtAd,allDon,filt,donFilter,campDonFilter){
  if(!adRows)return`<div class="hint"><i class="ti ti-info-circle" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>上傳廣告成效檔案後顯示整合表</div>`;
  // 廣告活動總表
  const campRows=cfg.map(camp=>{
    const campKey=src==='meta'?'行銷活動名稱':'廣告活動';const ca=src==='line'?filtAd:(camp.campNamePattern?filtAd.filter(r=>String(r[campKey]||'').toLowerCase().includes(camp.campNamePattern)):filtAd.filter(r=>(camp.campNames||[]).includes(r[campKey])));
    const don=allDon.filter(r=>campDonFilter(r,camp));
    const spend=src==='meta'?ca.reduce((s,r)=>s+(+r['花費金額 (TWD)']||0),0):src==='google'?ca.reduce((s,r)=>s+numVal(r['費用']),0):filtAd.reduce((s,r)=>s+numVal(r['Cost']),0);
    const click=src==='meta'?ca.reduce((s,r)=>s+(+r['連結點擊次數']||0),0):src==='google'?ca.reduce((s,r)=>s+numVal(r['點擊']),0):filtAd.reduce((s,r)=>s+numVal(r['Clicks']),0);
    const atc=src==='meta'?ca.reduce((s,r)=>s+(+r['加到購物車次數']||0),0):src==='google'?ca.reduce((s,r)=>s+numVal(r['ATC-點擊月捐按鈕']),0):filtAd.reduce((s,r)=>s+numVal(r['AddToCart']),0);
    const purch=src==='meta'?ca.reduce((s,r)=>s+(+r['購買次數']||0),0):src==='google'?ca.reduce((s,r)=>s+numVal(r['Purchase-完成捐款']),0):filtAd.reduce((s,r)=>s+numVal(r['Purchase']),0);
    return{label:camp.label,...campStats(spend,click,atc,purch,don)};
  });
  let html=buildCampTable(campRows);
  // 每日整體明細
  const dailyAll=getDailyStats(filt,src,donFilter);
  html+=`<div class="daily-sep">每日明細</div>`;
  html+=buildDailyTable(dailyAll);
  // 分活動每日明細 + 受眾 + 素材（僅 meta）
  if(src==='meta'){
    // 多選下拉
    const campLabels=cfg.map(c=>c.label);
    const checkboxes=campLabels.map(l=>`<label class="multiselect-item"><input type="checkbox" id="cb-${l.replace(/ /g,'_')}" ${metaSelectedCamps.length===0||metaSelectedCamps.includes(l)?'checked':''} onchange="toggleMetaCamp('${l}')"> ${l}</label>`).join('');
    const selLabel=metaSelectedCamps.length===0?'全部活動':metaSelectedCamps.join('、');
    html+=`<div class="daily-sep">分活動每日明細</div>
    <div id="meta-camp-multiselect" class="multiselect-wrap">
      <button class="multiselect-btn" onclick="toggleMetaDropdown()">
        <span id="meta-camp-btn-label">${selLabel}</span>
        <i class="ti ti-chevron-down" style="font-size:12px"></i>
      </button>
      <div class="multiselect-dropdown" id="meta-camp-dropdown">${checkboxes}</div>
    </div>
    <div id="meta-sel-tags" class="selected-tags"></div>
    <div id="meta-detail-section"></div>`;
  } else {
    html+=`<div class="daily-sep">分活動每日明細</div>`;
    cfg.forEach(camp=>{
      html+=`<div class="camp-sep">${camp.label}</div>`;
      const campDaily=getCampDailyStats(filt,src,camp,(r,c)=>campDonFilter(r,c));
      html+=buildDailyTable(campDaily);
    });
    // Pmax TA 捐款明細（Google 限定）
    if(src==='google'){
      const pmaxCamp=cfg.find(c=>c.campNamePattern==='pmax'||c.label==='Pmax');
      if(pmaxCamp){
        const pmaxDons=allDon.filter(r=>matchGoogle(r,pmaxCamp));
        if(pmaxDons.length){
          const taMap={};
          pmaxDons.forEach(r=>{const ta=parseTA(getUtmContent(r))||'無TA';if(!taMap[ta])taMap[ta]=[];taMap[ta].push(r);});
          const tas=Object.keys(taMap).sort();
          const rows=tas.map(ta=>{const m=calcM(taMap[ta].filter(validRow));return{label:ta,donTotal:m.total,donC5:m.c5,donAmt:m.amt,donA5:m.a5};});
          const totAll=calcM(pmaxDons.filter(validRow));
          const totRow2={label:'合計',donTotal:totAll.total,donC5:totAll.c5,donAmt:totAll.amt,donA5:totAll.a5};
          const body=[...rows,totRow2].map((r,i,arr)=>{
            const isTot=i===arr.length-1;
            return`<tr${isTot?' class="tot"':''}><td class="rh"${isTot?' style="background:var(--color-background-secondary)"':''}>${r.label}</td><td>${fmt(r.donTotal)}</td><td>${fmt(r.donC5)}</td><td>$${fmt(r.donAmt)}</td><td>$${fmt(r.donA5)}</td></tr>`;
          }).join('');
          // Pmax 素材表（SP開頭）
          const spMap={};
          pmaxDons.forEach(r=>{const sp=parseSP(getUtmContent(r));if(!sp)return;if(!spMap[sp])spMap[sp]=[];spMap[sp].push(r);});
          const spKeys=Object.keys(spMap).sort();
          const spRows=spKeys.map(sp=>{const m=calcM(spMap[sp].filter(validRow));return{label:sp,donTotal:m.total,donC5:m.c5,donAmt:m.amt,donA5:m.a5};});
          const spTotAll=calcM(pmaxDons.filter(r=>validRow(r)&&parseSP(getUtmContent(r))));
          const spTotRow={label:'合計',donTotal:spTotAll.total,donC5:spTotAll.c5,donAmt:spTotAll.amt,donA5:spTotAll.a5};
          const spBody=[...spRows,spTotRow].map((r,i,arr)=>{
            const isTot=i===arr.length-1;
            return`<tr${isTot?' class="tot"':''}><td class="rh"${isTot?' style="background:var(--color-background-secondary)"':''}>${r.label}</td><td>${fmt(r.donTotal)}</td><td>${fmt(r.donC5)}</td><td>$${fmt(r.donAmt)}</td><td>$${fmt(r.donA5)}</td></tr>`;
          }).join('');

          html+=`<div style="display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap">
            <div>
              <div class="daily-sep">Pmax 實際捐款 × 受眾（TA）</div>
              <div class="ad-wrap"><table class="ad-tbl">
                <thead><tr><th class="rh">受眾 (TA)</th><th>捐款數量</th><th>兒童月捐數量</th><th>捐款總額</th><th>兒童月捐總額</th></tr></thead>
                <tbody>${body}</tbody>
              </table></div>
            </div>
            ${spKeys.length?`<div>
              <div class="daily-sep">Pmax 實際捐款 × 素材（SP）</div>
              <div class="ad-wrap"><table class="ad-tbl">
                <thead><tr><th class="rh">素材 (SP)</th><th>捐款數量</th><th>兒童月捐數量</th><th>捐款總額</th><th>兒童月捐總額</th></tr></thead>
                <tbody>${spBody}</tbody>
              </table></div>
            </div>`:''}
          </div>`;
        }
      }
    }
  }
  return html;
}

function buildAdSection(){
  const{from,to}=getRange();
  const filt=filtDaily();
  const filtDates=new Set(filt.map(d=>d.isoDate));
  const allDon=daily.filter(d=>filtDates.has(d.isoDate)).flatMap(d=>d.allRows);
  const tab=currentAdTab;
  let html='';

  if(tab==='total'){
    // 只顯示三張廣告活動表，不顯示每日明細
    [
      {src:'meta',cfg:CONFIG.meta,adRows:metaAdRows,
        filtAd:metaAdRows?metaAdRows.filter(r=>{const dt=r['分析報告開始']||'';return dt>=from&&dt<=to;}):null,
        campDonFilter:(r,c)=>matchMeta(r,c),label:'Meta',color:'#0C447C'},
      {src:'google',cfg:CONFIG.google,adRows:gooAdRows,
        filtAd:gooAdRows?gooAdRows.filter(r=>{const dt=r['日期']||'';return dt>=from&&dt<=to;}):null,
        campDonFilter:(r,c)=>matchGoogle(r,c),label:'Google',color:'#633806'},
      {src:'line',cfg:CONFIG.line,adRows:lineAdRows,
        filtAd:lineAdRows?lineAdRows.filter(r=>{const dt=r['_dayIso']||'';return dt>=from&&dt<=to;}):null,
        campDonFilter:(r,c)=>matchLine(r),label:'LINE',color:'#065f46'},
    ].forEach((m,i)=>{
      if(i>0)html+=`<div class="divider" style="margin:.75rem 0"></div>`;
      html+=`<div style="font-size:12px;font-weight:500;color:${m.color};margin-bottom:6px">${m.label}</div>`;
      if(!m.adRows){html+=`<div class="hint"><i class="ti ti-info-circle" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>上傳廣告成效檔案後顯示整合表</div>`;return;}
      const campRows=m.cfg.map(camp=>{
        const campKey2=m.src==='meta'?'行銷活動名稱':'廣告活動';const ca=m.src==='line'?m.filtAd:(m.filtAd||[]).filter(r=>camp.campNamePattern?String(r[campKey2]||'').toLowerCase().includes(camp.campNamePattern):(camp.campNames||[]).includes(r[campKey2]));
        const don=allDon.filter(r=>m.campDonFilter(r,camp));
        const spend=m.src==='meta'?ca.reduce((s,r)=>s+(+r['花費金額 (TWD)']||0),0):m.src==='google'?ca.reduce((s,r)=>s+numVal(r['費用']),0):m.filtAd.reduce((s,r)=>s+numVal(r['Cost']),0);
        const click=m.src==='meta'?ca.reduce((s,r)=>s+(+r['連結點擊次數']||0),0):m.src==='google'?ca.reduce((s,r)=>s+numVal(r['點擊']),0):m.filtAd.reduce((s,r)=>s+numVal(r['Clicks']),0);
        const atc=m.src==='meta'?ca.reduce((s,r)=>s+(+r['加到購物車次數']||0),0):m.src==='google'?ca.reduce((s,r)=>s+numVal(r['ATC-點擊月捐按鈕']),0):m.filtAd.reduce((s,r)=>s+numVal(r['AddToCart']),0);
        const purch=m.src==='meta'?ca.reduce((s,r)=>s+(+r['購買次數']||0),0):m.src==='google'?ca.reduce((s,r)=>s+numVal(r['Purchase-完成捐款']),0):m.filtAd.reduce((s,r)=>s+numVal(r['Purchase']),0);
        return{label:camp.label,...campStats(spend,click,atc,purch,don)};
      });
      html+=buildCampTable(campRows);
    });
  }

  if(tab==='meta'){
    const filtAd=metaAdRows?metaAdRows.filter(r=>{const dt=r['分析報告開始']||'';return dt>=from&&dt<=to;}):null;
    html+=buildMediaSection('meta',CONFIG.meta,metaAdRows,filtAd,allDon,filt,r=>parseSrc(r['來源參數'])==='facebook',(r,c)=>matchMeta(r,c));
  }
  // 標記需要渲染 meta detail
  if(tab==='meta') setTimeout(renderMetaDetail,0);
  if(tab==='google'){
    const filtAd=gooAdRows?gooAdRows.filter(r=>{const dt=r['日期']||'';return dt>=from&&dt<=to;}):null;
    html+=buildMediaSection('google',CONFIG.google,gooAdRows,filtAd,allDon,filt,r=>parseSrc(r['來源參數'])==='google',(r,c)=>matchGoogle(r,c));
  }
  if(tab==='line'){
    const filtAd=lineAdRows?lineAdRows.filter(r=>{const dt=r['_dayIso']||'';return dt>=from&&dt<=to;}):null;
    html+=buildMediaSection('line',CONFIG.line,lineAdRows,filtAd,allDon,filt,r=>matchLine(r),(r,c)=>matchLine(r));
  }
  return html;
}

function loadConfig(file){
  const r=new FileReader();r.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const newCfg=parseConfig(wb);
    const hasAnySheet=wb.SheetNames.some(n=>['Meta','Google','LINE'].includes(n));
    if(hasAnySheet){if(newCfg.meta.length)CONFIG.meta=newCfg.meta;if(newCfg.google.length)CONFIG.google=newCfg.google;if(newCfg.line.length)CONFIG.line=newCfg.line;document.getElementById('config-name').textContent=file.name;document.getElementById('config-tag').style.display='inline-flex';if(daily.length)renderTables();}
    else alert('設定表讀取失敗，請確認分頁名稱為 Meta / Google / LINE');
  };r.readAsArrayBuffer(file);
}
function buildDailyFromAllSources(){
  // 從捐款日報取所有列
  const allRows=[];
  if(donWb){
    donWb.SheetNames.forEach(name=>{if(SKIP.includes(name))return;if(!name.match(/\d{4}/))return;const rows=XLSX.utils.sheet_to_json(donWb.Sheets[name],{defval:''});allRows.push(...rows);});
  } else if(donRows){
    allRows.push(...donRows);
  }
  const dateMap={};
  allRows.forEach(row=>{const iso=rowDateIso(row);if(!iso)return;if(!dateMap[iso])dateMap[iso]=[];dateMap[iso].push(row);});

  // 收集廣告來源的所有日期
  const adDates=new Set();
  if(metaAdRows)metaAdRows.forEach(r=>{const dt=r['分析報告開始']||'';if(dt)adDates.add(dt);});
  if(gooAdRows)gooAdRows.forEach(r=>{const dt=r['日期']||'';if(dt)adDates.add(dt);});
  if(lineAdRows)lineAdRows.forEach(r=>{const dt=r['_dayIso']||'';if(dt)adDates.add(dt);});

  // 合併：廣告有但捐款沒有的日期，建立空陣列
  adDates.forEach(iso=>{if(!dateMap[iso])dateMap[iso]=[];});

  daily=Object.entries(dateMap).map(([iso,rows])=>({isoDate:iso,label:dlWithWeek(iso),allRows:rows,
    meta:calcM(rows.filter(r=>parseSrc(r['來源參數'])==='facebook')),
    google:calcM(rows.filter(r=>parseSrc(r['來源參數'])==='google')),
    line:calcM(rows.filter(r=>parseSrc(r['來源參數'])==='line')),
  })).sort((a,b)=>a.isoDate.localeCompare(b.isoDate));
}

function updateDateRange(){
  if(!daily.length)return;
  const mn=daily[0].isoDate,mx=daily[daily.length-1].isoDate;
  const gf=document.getElementById('g-from'),gt=document.getElementById('g-to');
  const prevFrom=gf.value,prevTo=gt.value;
  gf.min=mn;gf.max=mx;gt.min=mn;gt.max=mx;
  if(!prevFrom||prevFrom<mn||prevFrom>mx)gf.value=mn;
  if(!prevTo||prevTo<mn||prevTo>mx)gt.value=mx;
  document.getElementById('date-bar').style.display='flex';
}

function loadXlsx(file){
  const r=new FileReader();r.onload=e=>{
    donWb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    buildDailyFromAllSources();updateDateRange();
    document.getElementById('sub-xlsx').textContent=file.name;document.getElementById('dz-xlsx').classList.add('loaded');buildDashboard();
  };r.readAsArrayBuffer(file);
}
function loadMetaCsv(file){Papa.parse(file,{header:true,skipEmptyLines:true,complete:res=>{metaAdRows=res.data;document.getElementById('sub-meta').textContent=file.name;document.getElementById('dz-meta').classList.add('loaded');buildDailyFromAllSources();updateDateRange();if(daily.length)renderTables();}});}
function loadGooCsv(file){Papa.parse(file,{header:true,skipEmptyLines:true,beforeFirstChunk:chunk=>{const lines=chunk.split(/\r?\n/);return lines.slice(2).join('\n');},complete:res=>{gooAdRows=res.data;document.getElementById('sub-goo').textContent=file.name;document.getElementById('dz-goo').classList.add('loaded');buildDailyFromAllSources();updateDateRange();if(daily.length)renderTables();}});}

const DON_SHEETS_ID='1B0ZaZwDnZx16CiCtEhqJcoQaG9LDRv3pc9Ds9rtcNZI';
async function loadDonFromSheets(){
  const st=document.getElementById('sheets-status-don');
  if(st){st.textContent='載入中…';st.style.color='var(--color-text-secondary)';}
  const today=new Date();
  // 從本月1日到今天
  const start=new Date(today.getFullYear(),today.getMonth(),1);
  const allRows=[];let loaded=0;
  for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd2=String(d.getDate()).padStart(2,'0');
    const sheetName=mm+dd2+'更新';
    try{
      const url=`https://docs.google.com/spreadsheets/d/${DON_SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
      const resp=await fetch(url);
      if(!resp.ok)continue;
      const text=await resp.text();
      if(!text||text.includes('Visualization: Access denied')||text.trim()==='')continue;
      const parsed=Papa.parse(text,{header:true,skipEmptyLines:true});
      if(parsed.data&&parsed.data.length>0){allRows.push(...parsed.data);loaded++;}
    }catch(e){continue;}
  }
  if(allRows.length>0){
    donWb=null;donRows=allRows;
    buildDailyFromAllSources();updateDateRange();
    document.getElementById('sub-xlsx').textContent=`已從 Sheets 載入（${loaded} 天）`;
    document.getElementById('dz-xlsx').classList.add('loaded');
    buildDashboard();
    if(st){st.textContent=`✓ 載入 ${loaded} 天資料`;st.style.color='#1D9E75';}
  }else{
    if(st){st.textContent='載入失敗，請用 .command 開啟儀表板';st.style.color='#c0392b';}
  }
}

const GOO_PUB_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQSUdpIyl1OIhkwWrt4zrkH2zzEwnfsocRXW__QnWXsew3aQom0xnyAGreEOxJrKW_nXSZoXTWdXfK6/pub?output=csv';
async function loadGooFromSheets(){
  const st=document.getElementById('sheets-status-goo');
  if(st)st.textContent='載入中…';
  try{
    const url=GOO_PUB_URL;
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    // 跳過前兩行（試算表標題說明行），第三行才是欄位名
    const csvBody=text.split(/\r?\n/).slice(2).join('\n');
    Papa.parse(csvBody,{header:true,skipEmptyLines:true,
      transformHeader:h=>{
        if(h.includes('廣告活動'))return'廣告活動';
        return h;
      },
      complete:res=>{
        gooAdRows=res.data;
        document.getElementById('sub-goo').textContent='已從 Sheets 載入';
        document.getElementById('dz-goo').classList.add('loaded');
        if(st){st.textContent='✓ 載入成功';st.style.color='#1D9E75';}
        buildDailyFromAllSources();updateDateRange();if(daily.length)renderTables();
      }
    });
  }catch(e){
    if(st){st.textContent='載入失敗：'+e.message;st.style.color='#c0392b';}
  }
}
function loadLineXlsx(file){
  const r=new FileReader();r.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    const ws=wb.Sheets['Raw'];if(!ws){alert('找不到 Raw 分頁');return;}
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    lineAdRows=rows.map(r=>{let day=r['Day'],iso='';if(day instanceof Date)iso=isoDate(day);else if(typeof day==='string'&&day.match(/\d{4}-\d{2}-\d{2}/))iso=day.substring(0,10);else if(typeof day==='number'){const d=new Date(Math.round((day-25569)*86400*1000));iso=isoDate(d);}return{...r,_dayIso:iso};});
    document.getElementById('sub-line').textContent=file.name;document.getElementById('dz-line').classList.add('loaded');buildDailyFromAllSources();updateDateRange();if(daily.length)renderTables();
  };r.readAsArrayBuffer(file);
}

const LINE_SHEETS_ID='1rfHflRL2oioAKOZtN7WsF_tA2csCpN0BAhtizXnRKE8';
async function loadLineFromSheets(){
  const st=document.getElementById('sheets-status-line');
  if(st){st.textContent='載入中…';st.style.color='var(--color-text-secondary)';}
  try{
    const url=`https://docs.google.com/spreadsheets/d/${LINE_SHEETS_ID}/gviz/tq?tqx=out:csv&sheet=Raw`;
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    if(!text||text.includes('Visualization: Access denied'))throw new Error('無法存取試算表');
    const parsed=Papa.parse(text,{header:true,skipEmptyLines:true});
    if(!parsed.data||!parsed.data.length)throw new Error('無資料');
    lineAdRows=parsed.data.map(r=>{
      const day=r['Day']||'';
      const iso=day.match(/\d{4}-\d{2}-\d{2}/)?day.substring(0,10):'';
      return{...r,_dayIso:iso};
    });
    document.getElementById('sub-line').textContent='已從 Sheets 載入';
    document.getElementById('dz-line').classList.add('loaded');
    if(st){st.textContent='✓ 載入成功';st.style.color='#1D9E75';}
    buildDailyFromAllSources();updateDateRange();if(daily.length)renderTables();
  }catch(e){
    if(st){st.textContent='載入失敗：'+e.message;st.style.color='#c0392b';}
  }
}

document.getElementById('fi-xlsx').addEventListener('change',e=>{if(e.target.files[0])loadXlsx(e.target.files[0]);});
document.getElementById('fi-meta').addEventListener('change',e=>{if(e.target.files[0])loadMetaCsv(e.target.files[0]);});

['dz-xlsx','dz-meta','dz-goo','dz-line'].forEach((id,i)=>{
  const handler=[loadXlsx,loadMetaCsv,loadGooCsv,loadLineXlsx][i];

async function reloadAllSheets(){

  const tasks=[loadDonFromSheets(),loadGooFromSheets(),loadLineFromSheets()];
  if(localStorage.getItem('meta_access_token'))tasks.push(loadMetaFromAPI());
  await Promise.all(tasks);
  if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> 重新抓取';}
}
